<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Maintenance Mobile</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --neon-green: #39ff14;
            --bg-dark: #050608;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif, Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: env(safe-area-inset-top) 10px;
            box-sizing: border-box;
            overflow-x: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s;
        }

        /* Jauge de température fluide */
        .heat-container {
            width: 100%;
            max-width: 500px;
            margin: 20px 0;
            text-align: center;
        }

        .heat-track {
            height: 12px;
            background: #1a1c25;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 0 5px #000;
        }

        #heat-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-red));
            box-shadow: 0 0 15px var(--neon-red);
            transition: width 0.1s linear, filter 0.3s;
        }

        .heat-label {
            color: var(--neon-red);
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Grille de contrôle AUTO-ADAPTATIVE (Portrait/Paysage) */
        .control-grid {
            display: flex;
            flex-direction: row; 
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px 5px;
            background: rgba(15, 17, 26, 0.95);
            border: 1px solid #222;
            border-radius: 10px;
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        /* Ventilateur ajustable (taille basée sur l'écran) */
        .fan-frame {
            width: 18vw;
            height: 18vw;
            max-width: 80px;
            max-height: 80px;
            min-width: 55px;
            min-height: 55px;
            border: 2px solid #333;
            border-radius: 50%;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s;
        }

        .fan-hub {
            width: 15%;
            height: 15%;
            background: var(--neon-blue);
            border-radius: 50%;
            z-index: 2;
        }

        .blades-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .blade {
            position: absolute;
            width: 10%;
            height: 40%;
            background: #444;
            left: 45%;
            bottom: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
        }

        .blade:nth-child(2) { transform: rotate(120deg); }
        .blade:nth-child(3) { transform: rotate(240deg); }

        .percent-display {
            font-family: monospace;
            font-size: clamp(0.8rem, 3.5vw, 1.1rem);
            color: var(--neon-blue);
            margin: 12px 0;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        /* Zone de Slider Tactile Portrait */
        .slider-wrap {
            height: clamp(160px, 45vh, 250px);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        input[type=range].vertical-slider {
            -webkit-appearance: none;
            width: clamp(140px, 40vh, 220px);
            height: 60px; /* Zone tactile large */
            background: transparent;
            transform: rotate(-90deg);
            outline: none;
            cursor: pointer;
            touch-action: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #222;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 40px;
            width: 28px;
            background: var(--neon-blue);
            margin-top: -18px;
            box-shadow: 0 0 12px var(--neon-blue);
            border-radius: 3px;
        }

        .unit-label {
            margin-top: 10px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 1px;
        }

        #status-msg {
            margin-top: 25px;
            text-align: center;
            min-height: 100px;
        }

        #text {
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .btn-reset {
            padding: 15px 25px;
            background: transparent;
            color: white;
            border: 1px solid var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-size: 0.7rem;
            display: none;
            cursor: pointer;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="heat-container">
        <div class="heat-label">CORE TEMPERATURE : <span id="temp-val">0</span>%</div>
        <div class="heat-track">
            <div id="heat-bar"></div>
        </div>
    </div>

    <div class="control-grid">
        <div class="column">
            <div class="fan-frame">
                <div id="f0" class="blades-container"><div class="blade"></div><div class="blade"></div><div class="blade"></div></div>
                <div class="fan-hub"></div>
            </div>
            <div id="p0" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s0" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-ALPHA</span>
        </div>

        <div class="column">
            <div class="fan-frame">
                <div id="f1" class="blades-container"><div class="blade"></div><div class="blade"></div><div class="blade"></div></div>
                <div class="fan-hub"></div>
            </div>
            <div id="p1" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s1" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-BETA</span>
        </div>

        <div class="column">
            <div class="fan-frame">
                <div id="f2" class="blades-container"><div class="blade"></div><div class="blade"></div><div class="blade"></div></div>
                <div class="fan-hub"></div>
            </div>
            <div id="p2" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s2" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-GAMMA</span>
        </div>
    </div>

    <div id="status-msg">
        <div id="text">STABILISATION REQUISE</div>
        <button class="btn-reset" id="reset-btn" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>

    <script>
        const sliders = [document.getElementById('s0'), document.getElementById('s1'), document.getElementById('s2')];
        const percents = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2')];
        const fans = [document.getElementById('f0'), document.getElementById('f1'), document.getElementById('f2')];
        const heatBar = document.getElementById('heat-bar');
        const tempVal = document.getElementById('temp-val');
        const resetBtn = document.getElementById('reset-btn');
        const statusText = document.getElementById('text');
        
        let heat = 0;
        let gameActive = true;
        let currentError = 12;
        const duration = 300; // 5 minutes

        const solution =[2,7,5];

        function update() {
            if(!gameActive) return;
            const vals = sliders.map(s => parseInt(s.value));
            vals.forEach((v, i) => percents[i].textContent = (v * 10) + "%");
            
            let totalError = 0;
            vals.forEach((v, i) => totalError += Math.abs(v - solution[i]));
            
            if(window.navigator.vibrate) window.navigator.vibrate(10);

            currentError = totalError;
            fans.forEach((fan) => {
                if (totalError === 0) {
                    fan.style.animation = "none";
                    fan.parentElement.style.borderColor = "var(--neon-green)";
                    fan.parentElement.querySelector('.fan-hub').style.background = "var(--neon-green)";
                } else {
                    const speed = Math.max(0.1, 1.5 / totalError);
                    fan.style.animation = `spin ${speed}s linear infinite`;
                    fan.parentElement.style.borderColor = "#333";
                    fan.parentElement.querySelector('.fan-hub').style.background = "var(--neon-blue)";
                }
            });

            if (totalError === 0) victory();
        }

        const heatTimer = setInterval(() => {
            if(!gameActive) return;
            let baseSpeed = (100 / (duration * 10)); 
            let malus = currentError * 0.02; 
            heat += (baseSpeed + malus);
            heatBar.style.width = Math.min(heat, 100) + "%";
            tempVal.textContent = Math.floor(heat);

            if (currentError > 4) {
                heatBar.style.filter = "hue-rotate(-50deg) saturate(2)";
            } else {
                heatBar.style.filter = "hue-rotate(0deg)";
            }

            if(heat >= 100) gameOver();
        }, 100);

        function victory() {
            gameActive = false;
            statusText.innerHTML = "<span style='color:var(--neon-green)'>SUCCESS : CORE STABLE</span>";
            resetBtn.style.display = "inline-block";
            if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
        }

        function gameOver() {
            gameActive = false;
            statusText.innerHTML = "<span style='color:var(--neon-red)'>CRITICAL ERROR : MELTDOWN</span>";
            document.body.style.backgroundColor = "#1a0000";
            sliders.forEach(s => s.disabled = true);
            resetBtn.style.display = "inline-block";
            if(window.navigator.vibrate) window.navigator.vibrate(500);
        }

        sliders.forEach(s => s.addEventListener('input', update));
        update();
    </script>
</body>
</html>
