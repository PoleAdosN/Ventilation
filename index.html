<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Maintenance - Mobile</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --neon-green: #39ff14;
            --bg-dark: #050608;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif, Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Aligné vers le haut pour le portrait */
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Jauge de surchauffe */
        .heat-container {
            width: 100%;
            margin-bottom: 30px;
            text-align: center;
        }

        .heat-track {
            height: 10px;
            background: #1a1c25;
            border: 1px solid #333;
            border-radius: 5px;
            overflow: hidden;
        }

        #heat-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-red));
            box-shadow: 0 0 10px var(--neon-red);
            transition: width 0.1s linear;
        }

        .heat-label {
            color: var(--neon-red);
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* Grille de contrôle en mode PORTRAIT */
        .control-grid {
            display: flex;
            flex-direction: row; /* On garde les colonnes côte à côte */
            gap: 10px;
            padding: 15px 5px;
            background: rgba(15, 17, 26, 0.9);
            border: 1px solid #222;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1; /* Chaque colonne prend 1/3 de la largeur */
            max-width: 33%;
        }

        /* Ventilateur compact */
        .fan-frame {
            width: 65px;
            height: 65px;
            border: 2px solid #333;
            border-radius: 50%;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .fan-hub {
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            z-index: 2;
        }

        .blades-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .blade {
            position: absolute;
            width: 6px;
            height: 25px;
            background: #555;
            left: 50%;
            bottom: 50%;
            transform-origin: bottom center;
            margin-left: -3px;
        }

        .blade:nth-child(2) { transform: rotate(120deg); }
        .blade:nth-child(3) { transform: rotate(240deg); }

        .percent-display {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--neon-blue);
            margin-bottom: 10px;
        }

        /* Sliders Verticaux Tactiles */
        .slider-wrap {
            height: 200px; /* Plus grand pour plus de précision au doigt */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
        }

        input[type=range].vertical-slider {
            -webkit-appearance: none;
            width: 180px; /* Longueur physique du slider une fois tourné */
            height: 60px; /* Largeur de la zone tactile pour le pouce */
            background: transparent;
            transform: rotate(-90deg);
            outline: none;
            margin: 0;
            touch-action: none;
        }

        /* Barre du slider */
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #222;
            border-radius: 2px;
        }

        /* Bouton du slider (Thumb) */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 45px;
            width: 30px;
            background: var(--neon-blue);
            margin-top: -21px; /* (4/2) - (45/2) */
            box-shadow: 0 0 15px var(--neon-blue);
            border-radius: 3px;
            cursor: pointer;
        }

        .unit-label {
            margin-top: 10px;
            font-size: 0.6rem;
            color: #444;
        }

        #status-msg {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            min-height: 80px;
        }

        .btn-reset {
            margin-top: 15px;
            padding: 15px 30px;
            background: transparent;
            color: white;
            border: 1px solid var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            display: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="heat-container">
        <div class="heat-label">TEMPERATURE NOYAU : <span id="temp-val">0</span>%</div>
        <div class="heat-track">
            <div id="heat-bar"></div>
        </div>
    </div>

    <div class="control-grid">
        <div class="column">
            <div class="fan-frame">
                <div id="f0" class="blades-container"><div class="blade"></div><div class="blade"></div><div class="blade"></div></div>
                <div class="fan-hub"></div>
            </div>
            <div id="p0" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s0" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-ALPHA</span>
        </div>

        <div class="column">
            <div class="fan-frame">
                <div id="f1" class="blades-container"><div class="blade"></div><div class="blade"></div><div class="blade"></div></div>
                <div class="fan-hub"></div>
            </div>
            <div id="p1" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s1" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-BETA</span>
        </div>

        <div class="column">
            <div class="fan-frame">
                <div id="f2" class="blades-container"><div class="blade"></div><div class="blade"></div><div class="blade"></div></div>
                <div class="fan-hub"></div>
            </div>
            <div id="p2" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s2" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-GAMMA</span>
        </div>
    </div>

    <div id="status-msg">
        <div id="text">MAINTENANCE REQUISE</div>
        <button class="btn-reset" id="reset-btn" onclick="location.reload()">REDÉMARRER</button>
    </div>

    <script>
        const sliders = [document.getElementById('s0'), document.getElementById('s1'), document.getElementById('s2')];
        const percents = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2')];
        const fans = [document.getElementById('f0'), document.getElementById('f1'), document.getElementById('f2')];
        const heatBar = document.getElementById('heat-bar');
        const tempVal = document.getElementById('temp-val');
        const resetBtn = document.getElementById('reset-btn');
        const statusText = document.getElementById('text');
        
        let heat = 0;
        let gameActive = true;
        let currentError = 12;
        const duration = 300; 

        const solution = [2,7,5)];

        function update() {
            if(!gameActive) return;
            const vals = sliders.map(s => parseInt(s.value));
            vals.forEach((v, i) => percents[i].textContent = (v * 10) + "%");
            
            let totalError = 0;
            vals.forEach((v, i) => totalError += Math.abs(v - solution[i]));
            
            // Vibration légère lors du changement (Android)
            if(window.navigator.vibrate) window.navigator.vibrate(10);

            currentError = totalError;
            fans.forEach((fan) => {
                if (totalError === 0) {
                    fan.style.animation = "none";
                    fan.parentElement.style.borderColor = "var(--neon-green)";
                    fan.parentElement.querySelector('.fan-hub').style.background = "var(--neon-green)";
                } else {
                    const speed = Math.max(0.1, 1.5 / totalError);
                    fan.style.animation = `spin ${speed}s linear infinite`;
                    fan.parentElement.style.borderColor = "#333";
                    fan.parentElement.querySelector('.fan-hub').style.background = "var(--neon-blue)";
                }
            });

            if (totalError === 0) victory();
        }

        const heatTimer = setInterval(() => {
            if(!gameActive) return;
            let baseSpeed = (100 / (duration * 10)); 
            let malus = currentError * 0.02; 
            heat += (baseSpeed + malus);
            heatBar.style.width = Math.min(heat, 100) + "%";
            tempVal.textContent = Math.floor(heat);
            if(heat >= 100) gameOver();
        }, 100);

        function victory() {
            gameActive = false;
            statusText.innerHTML = "<span style='color:var(--neon-green)'>NOYAU STABILISÉ</span>";
            resetBtn.style.display = "inline-block";
            if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
        }

        function gameOver() {
            gameActive = false;
            statusText.innerHTML = "<span style='color:var(--neon-red)'>FUSION DU SYSTÈME</span>";
            document.body.style.backgroundColor = "#200";
            sliders.forEach(s => s.disabled = true);
            resetBtn.style.display = "inline-block";
            if(window.navigator.vibrate) window.navigator.vibrate(500);
        }

        sliders.forEach(s => s.addEventListener('input', update));
        update();
    </script>
</body>
</html>
