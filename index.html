<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Console de Refroidissement Cyberpunk</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --neon-green: #39ff14;
            --bg-dark: #050608;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif, Arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
            transition: background-color 0.5s;
        }

        /* Jauge de surchauffe adaptée */
        .heat-container {
            width: 95%;
            max-width: 800px;
            margin-bottom: 20px;
            text-align: center;
        }

        .heat-track {
            height: 12px;
            background: #1a1c25;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
        }

        #heat-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-red));
            box-shadow: 0 0 15px var(--neon-red);
            transition: width 0.1s linear, filter 0.3s;
        }

        .heat-label {
            color: var(--neon-red);
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Panneau de contrôle flexible */
        .control-grid {
            display: flex;
            gap: 15px; /* Réduit pour mobile */
            padding: 20px 10px;
            background: #0f111a;
            border: 1px solid #222;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            width: 100%;
            max-width: 500px;
            justify-content: space-around;
        }

        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        /* Ventilateur plus petit pour mobile */
        .fan-frame {
            width: 70px;
            height: 70px;
            border: 2px solid #333;
            border-radius: 50%;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fan-hub {
            width: 10px;
            height: 10px;
            background: var(--neon-blue);
            border-radius: 50%;
            z-index: 2;
        }

        .blades-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blade {
            position: absolute;
            width: 8px;
            height: 28px;
            background: #444;
            border-radius: 4px;
            transform-origin: bottom center;
            bottom: 50%;
        }

        .blade:nth-child(2) { transform: rotate(120deg); }
        .blade:nth-child(3) { transform: rotate(240deg); }

        .percent-display {
            font-family: monospace;
            font-size: 1rem;
            color: var(--neon-blue);
        }

        /* Slider vertical mieux géré */
        .slider-wrap {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Zone du slider optimisée pour le tactile */
        .slider-wrap {
            height: 160px; /* Légèrement plus grand pour laisser de la place au doigt */
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none; /* Empêche le défilement de la page pendant qu'on glisse */
        }

        input[type=range].vertical-slider {
            -webkit-appearance: none;
            width: 140px; 
            height: 50px; /* Hauteur augmentée pour agrandir la zone tactile */
            background: transparent;
            transform: rotate(-90deg);
            cursor: pointer;
            outline: none;
        }

        /* La barre (track) */
        input[type=range]::-webkit-slider-runnable-track {
            height: 6px;
            background: #222;
            border-radius: 3px;
        }

        /* Le bouton (thumb) - AGRANDI POUR LE DOIGT */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 40px; /* Plus haut */
            width: 30px;  /* Plus large */
            background: var(--neon-blue);
            margin-top: -17px; /* Centrage vertical ( (6/2) - (40/2) ) */
            box-shadow: 0 0 15px var(--neon-blue);
            border-radius: 4px;
            border: none;
        }

        /* Compatibilité Firefox */
        input[type=range]::-moz-range-thumb {
            height: 40px;
            width: 30px;
            background: var(--neon-blue);
            border: none;
            border-radius: 4px;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #222;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 30px;
            width: 20px;
            background: var(--neon-blue);
            margin-top: -13px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .unit-label {
            font-size: 0.6rem;
            color: #555;
        }

        #status-msg {
            margin-top: 25px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            height: 80px;
            text-align: center;
        }

        .btn-reset {
            margin-top: 10px;
            padding: 12px 20px;
            background: transparent;
            color: white;
            border: 1px solid white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            display: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Ajustement spécial pour très petits écrans */
        @media (max-width: 360px) {
            .control-grid { gap: 5px; }
            .fan-frame { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <div class="heat-container">
        <div class="heat-label">TEMP : <span id="temp-val">0</span>%</div>
        <div class="heat-track">
            <div id="heat-bar"></div>
        </div>
    </div>

    <div class="control-grid">
        <div class="column">
            <div class="fan-frame">
                <div id="f0" class="blades-container">
                    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
                </div>
                <div class="fan-hub"></div>
            </div>
            <div id="p0" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s0" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-A</span>
        </div>

        <div class="column">
            <div class="fan-frame">
                <div id="f1" class="blades-container">
                    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
                </div>
                <div class="fan-hub"></div>
            </div>
            <div id="p1" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s1" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-B</span>
        </div>

        <div class="column">
            <div class="fan-frame">
                <div id="f2" class="blades-container">
                    <div class="blade"></div><div class="blade"></div><div class="blade"></div>
                </div>
                <div class="fan-hub"></div>
            </div>
            <div id="p2" class="percent-display">0%</div>
            <div class="slider-wrap">
                <input type="range" class="vertical-slider" id="s2" min="0" max="10" step="1" value="0">
            </div>
            <span class="unit-label">U-C</span>
        </div>
    </div>

    <div id="status-msg">
        <div>MAINTENANCE REQUISE</div>
        <button class="btn-reset" id="reset-btn" onclick="location.reload()">REDÉMARRER</button>
    </div>

    <script>
        const sliders = [document.getElementById('s0'), document.getElementById('s1'), document.getElementById('s2')];
        const percents = [document.getElementById('p0'), document.getElementById('p1'), document.getElementById('p2')];
        const fans = [document.getElementById('f0'), document.getElementById('f1'), document.getElementById('f2')];
        const heatBar = document.getElementById('heat-bar');
        const tempVal = document.getElementById('temp-val');
        const resetBtn = document.getElementById('reset-btn');
        const statusText = document.querySelector('#status-msg div');
        
        let heat = 0;
        let gameActive = true;
        let currentError = 12; 
        const duration = 300; 

        const solution = [2,7,5];

        function update() {
            if(!gameActive) return;
            const vals = sliders.map(s => parseInt(s.value));
            vals.forEach((v, i) => percents[i].textContent = (v * 10) + "%");
            let totalError = 0;
            vals.forEach((v, i) => totalError += Math.abs(v - solution[i]));
            currentError = totalError;
            fans.forEach((fan) => {
                if (totalError === 0) {
                    fan.style.animation = "none";
                    fan.parentElement.style.borderColor = "var(--neon-green)";
                    fan.parentElement.querySelector('.fan-hub').style.background = "var(--neon-green)";
                } else {
                    const speed = Math.max(0.1, 1.5 / totalError);
                    fan.style.animation = `spin ${speed}s linear infinite`;
                    fan.parentElement.style.borderColor = "#333";
                    fan.parentElement.querySelector('.fan-hub').style.background = "var(--neon-blue)";
                }
            });
            if (totalError === 0) victory();
        }

        const heatTimer = setInterval(() => {
            if(!gameActive) return;
            let baseSpeed = (100 / (duration * 10)); 
            let malus = currentError * 0.02; 
            heat += (baseSpeed + malus);
            heatBar.style.width = Math.min(heat, 100) + "%";
            tempVal.textContent = Math.floor(heat);
            if (currentError > 4) {
                heatBar.style.filter = "hue-rotate(-50deg) saturate(2)";
            } else {
                heatBar.style.filter = "hue-rotate(0deg)";
            }
            if(heat >= 100) gameOver();
        }, 100);

        function victory() {
            gameActive = false;
            statusText.innerHTML = "<span style='color:var(--neon-green)'>SYSTÈME STABILISÉ</span>";
            resetBtn.style.display = "inline-block";
        }

        function gameOver() {
            gameActive = false;
            statusText.innerHTML = "<span style='color:var(--neon-red)'>FUSION DU NOYAU</span>";
            document.body.style.backgroundColor = "#1a0000";
            sliders.forEach(s => s.disabled = true);
            resetBtn.style.display = "inline-block";
        }

        sliders.forEach(s => s.addEventListener('input', update));
        update();
    </script>
</body>
</html>
